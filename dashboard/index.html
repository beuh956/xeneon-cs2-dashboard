<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XENEON CS2 Dashboard</title>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/theme.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/widgets.css" />
  <link rel="stylesheet" href="./css/animations.css" />
</head>
<body>
  <main class="hud" id="app">
    <section class="topbar">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <div>
          <strong>XENEON HUD</strong>
          <span data-ui="connection">DEMO MODE</span>
        </div>
      </div>

      <div class="vital hp">
        <span>HP</span>
        <strong data-ui="hp">100</strong>
        <i data-ui="hp-bar"></i>
      </div>

      <div class="vital armor">
        <span>ARMOR</span>
        <strong data-ui="armor">100</strong>
        <i data-ui="armor-bar"></i>
      </div>

      <div class="money">
        <span>MONEY</span>
        <strong data-ui="money">$4200</strong>
      </div>

      <div class="scoreboard">
        <div class="team ct"><span>CT</span><strong data-ui="score-ct">08</strong></div>
        <div class="timer">
          <span data-ui="round-phase">ROUND LIVE</span>
          <strong data-ui="timer">01:24</strong>
        </div>
        <div class="team t"><strong data-ui="score-t">05</strong><span>T</span></div>
      </div>

      <div class="bomb-chip" data-ui="bomb-card">
        <span>BOMB</span>
        <strong data-ui="bomb-state">SAFE</strong>
        <em data-ui="bomb-timer">--</em>
      </div>
    </section>

    <section class="mainstage">
      <div class="map-mini">
        <span>MAP</span>
        <strong data-ui="map">Mirage</strong>
        <em>TACTICAL MODE</em>
      </div>

      <div class="weapon-stage">
        <span>ACTIVE WEAPON</span>
        <!--
        <img data-ui="weapon-icon" class="weapon-icon" src="./assets/weapons/default.svg" alt="" />
        -->
        <strong data-ui="weapon">AK-47</strong>
        <em data-ui="ammo">30 / 90</em>
      </div>

      <div class="player-mini">
        <span>PLAYER</span>
        <strong data-ui="player-name">beuh95</strong>
        <em data-ui="kd">12/5</em>
      </div>
    </section>

    <section class="bottombar">
      <div class="utility">
        <div><span>FLASH</span><strong data-ui="flash">2</strong></div>
        <div><span>SMOKE</span><strong data-ui="smoke">1</strong></div>
        <div><span>HE</span><strong data-ui="he">1</strong></div>
        <div><span>FIRE</span><strong data-ui="fire">1</strong></div>
        <div><span>KIT</span><strong data-ui="kit">NO</strong></div>
      </div>

      <div class="stats">
        <div><span>ADR</span><strong data-ui="adr">84</strong></div>
        <div><span>HS</span><strong data-ui="hs">58%</strong></div>
        <div><span>PING</span><strong data-ui="ping">--</strong></div>
      </div>

      <div class="footer-note">V0.3 GAMEPLAY HUD · CS2 GSI LIVE · XENEON EDGE</div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
